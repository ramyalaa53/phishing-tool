{% extends "base.html" %}
  {% block content %}
 <div class="register-container">
    <div class="col-md-5 col-lg-4">
      <div class="register-card">
        <div class="register-header">
          <h3>🚀 Create Account</h3>
          <p>Join PhishDetect for advanced security</p>
        </div>

        <form method="post" action="#">

          <div class="form-group">
            <i class="fas fa-user"></i>
            <input type="text" class="form-control" name="name" placeholder="Enter your full name" required>
          </div>

          <div class="form-group">
            <i class="fas fa-envelope"></i>
            <input type="email" class="form-control" name="email" placeholder="Enter your email address" required>
          </div>

          <div class="form-group">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control" name="password" id="password" placeholder="Create a strong password" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
          </div>

          <div class="form-group">
            <i class="fas fa-shield-alt"></i>
            <input type="password" class="form-control" name="confirm" id="confirm-password" placeholder="Confirm your password" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm-password', this)"></i>
          </div>

          <button class="btn btn-register w-100" type="submit">
            <i class="fas fa-user-plus" style="margin-right: 8px;"></i>
            Create Account
          </button>
        </form>

        <div class="login-link">
          Already have an account? <a href="#login">Login here</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Add floating label effect
    document.querySelectorAll('.form-control').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.classList.add('focused');
      });

      input.addEventListener('blur', function() {
        this.parentElement.classList.remove('focused');
      });
    });

    // Toggle password visibility
    function togglePassword(fieldId, icon) {
      const field = document.getElementById(fieldId);
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }
  </script>
  {% endblock %}
